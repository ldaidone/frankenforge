services:
  frankenforge:
    image: dunglas/frankenphp:latest
    container_name: frankenforge
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # QUIC/HTTP3
    volumes:
      - .:/app
    environment:
      FRANKENPHP_CONFIG: "root /app/public\nphp_server"
      PHP_INI_VALUES: "opcache.validate_timestamps=1,opcache.revalidate_freq=0,opcache.enable_cli=0"
    command: frankenphp run --config /app/Caddyfile
